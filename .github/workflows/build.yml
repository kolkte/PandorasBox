name: Build

on:
    push:
        branches: ["*"]

jobs:
    build:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Build
              run: dotnet build PandorasBox/PandorasBox.csproj --configuration Release

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: PandorasBox
                  path: PandorasBox/bin/Release/**/*.dll
